<!DOCTYPE html>
<!-- Define que el documento usa HTML5 -->

<html lang="es">
<!-- Inicio de la página y define el idioma español -->

<head>

    <meta charset="UTF-8">
    <!-- Permite usar caracteres especiales -->

    <title>Registro</title>
    <!-- Título que aparece en la pestaña -->

    <link rel="stylesheet" href="style.css">
    <!-- Conecta el archivo CSS -->

    <!-- Fuente de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Importa la fuente Dancing Script -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">

    <!-- Librería de iconos Font Awesome -->
    <script src="https://kit.fontawesome.com/2600c6ce36.js" crossorigin="anonymous"></script>

</head>

<body>

    <!-- MENÚ PRINCIPAL -->
    <div class="menu">

        <!-- Icono del teclado -->
        <a href="#" class="icono">

            <i class="fas fa-keyboard"></i>

        </a>

        <!-- Enlaces -->
        <a href="index.html">Inicio</a>

        <a href="iniciosesion.html">Inicio Sesión</a>

        <!-- Icono usuario -->
        <a href="#">

            <i class="fas fa-user"></i>

        </a>

    </div>

    <!-- CONTENEDOR REGISTRO -->
    <div class="login-container">

        <!-- TÍTULO -->
        <h2>Crear Cuenta</h2>

        <!-- FORMULARIO -->
        <form>

            <!-- Nombre -->
            <input type="text" placeholder="Nombre completo">

            <!-- Correo -->
            <input type="email" placeholder="Correo electrónico">

            <!-- Usuario -->
            <input type="text" placeholder="Nombre de usuario">

            <!-- Contraseña -->
            <input type="password" placeholder="Contraseña">

            <!-- Botón -->
            <button type="submit">

                Regístrarse

            </button>

        </form>

    </div>

    <!-- PIE DE PÁGINA -->
    <footer class="footer">

        <!-- REDES -->
        <div class="redes">

            <span><i class="fab fa-instagram"></i></span>

            <span><i class="fab fa-facebook"></i></span>

            <span><i class="fab fa-whatsapp"></i></span>

            <span><i class="fab fa-twitter"></i></span>

            <span><i class="fab fa-linkedin"></i></span>

        </div>

        <!-- Información -->
        <p>© 2026 Jhoan Carlos Chen Chá</p>

        <p>Introducción a los sistemas de computo</p>

    </footer>

</body>

</html>
